<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToDO-API | Modern Todo</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>ToDO-API</h1>
      <p class="subtitle">Learn Flask</p>
    </header>

    <form class="add-form" id="add-task-form">
      <input type="text" id="new-task-title" placeholder="Add a new task..." autocomplete="off" required />
      <button type="submit" class="btn-primary">Add Task</button>
    </form>

    <div id="empty-state" class="empty-state hidden">
      <p>All caught up! 🎉</p>
    </div>

    <ul class="task-list" id="task-list">
      <!-- Tasks will be injected here -->
    </ul>
  </div>

  <div id="error-toast">Error message goes here</div>

  <script>
    const API_BASE = "/tasks";

    const taskListEl = document.getElementById("task-list");
    const addTaskForm = document.getElementById("add-task-form");
    const newTaskInput = document.getElementById("new-task-title");
    const emptyStateEl = document.getElementById("empty-state");
    const errorToastEl = document.getElementById("error-toast");

    function showError(msg) {
      errorToastEl.textContent = msg;
      errorToastEl.classList.add("visible");
      setTimeout(() => errorToastEl.classList.remove("visible"), 4000);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function fetchTasks() {
      try {
        const res = await fetch(API_BASE);
        const tasks = await res.json();
        renderTasks(tasks);
      } catch (err) {
        showError("Failed to load tasks");
      }
    }

    function renderTasks(tasks) {
      taskListEl.innerHTML = "";
      
      if (tasks.length === 0) {
        emptyStateEl.classList.remove("hidden");
        return;
      }
      emptyStateEl.classList.add("hidden");

      tasks.forEach(task => {
        const li = document.createElement("li");
        li.className = `task-item ${task.completed ? 'completed' : ''}`;
        li.dataset.id = task._id;

        li.innerHTML = `
          <div class="task-content">
            <label class="checkbox-wrapper">
              <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask('${task._id}', ${!task.completed})">
              <span class="checkbox-custom"></span>
            </label>
            <span class="task-title" onclick="enableEdit(this, '${task._id}')">${escapeHtml(task.title)}</span>
          </div>
          <div class="actions">
            <button class="btn-action btn-delete" onclick="deleteTask('${task._id}')" title="Delete Task">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            </button>
          </div>
        `;
        taskListEl.appendChild(li);
      });
    }

    async function addTask(e) {
      e.preventDefault();
      const title = newTaskInput.value.trim();
      if (!title) return;

      try {
        const res = await fetch(API_BASE, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title })
        });
        
        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.ERROR || "Failed to create task");
        }

        newTaskInput.value = "";
        fetchTasks();
      } catch (err) {
        showError(err.message);
      }
    }

    async function toggleTask(id, completed) {
      try {
        const res = await fetch(`${API_BASE}/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ completed })
        });
        if (!res.ok) throw new Error("Update failed");
        fetchTasks();
      } catch (err) {
        showError(err.message);
      }
    }

    async function deleteTask(id) {
      if (!confirm("Are you sure you want to delete this task?")) return;
      try {
        const res = await fetch(`${API_BASE}/${id}`, { method: "DELETE" });
        if (!res.ok) throw new Error("Delete failed");
        fetchTasks();
      } catch (err) {
        showError(err.message);
      }
    }

    function enableEdit(el, id) {
      const currentTitle = el.textContent;
      const input = document.createElement("input");
      input.type = "text";
      input.className = "edit-input";
      input.value = currentTitle;

      input.onblur = () => finishEdit(input, id, currentTitle);
      input.onkeydown = (e) => {
        if (e.key === "Enter") input.blur();
        if (e.key === "Escape") {
          input.value = currentTitle;
          input.blur();
        }
      };

      el.replaceWith(input);
      input.focus();
    }

    async function finishEdit(input, id, oldTitle) {
      const newTitle = input.value.trim();
      if (!newTitle || newTitle === oldTitle) {
        fetchTasks(); // Just refresh to restore state
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title: newTitle })
        });
        if (!res.ok) throw new Error("Update failed");
        fetchTasks();
      } catch (err) {
        showError(err.message);
        fetchTasks();
      }
    }

    addTaskForm.addEventListener("submit", addTask);
    
    // Initial load
    fetchTasks();
  </script>
</body>
</html>
